<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container head">
        <header class="header">
            <h1>Where in the world?</h1>
            <button id="darkBtn">
                🌙 Dark Mode
            </button>
        </header>

        <section class="controls">
            <input class="search-input" id="search-input" required type="text" placeholder="Search for a country...">

            <select id="capital">
                <option value="all">Filter by capital</option>
                <option value="Astana">Astana</option>
                <option value="Amman">Amman</option>
                <option value="Baku">Baku</option>
                <option value="Bandar Seri Begawan">Bandar Seri Begawan</option>
                <option value="Beijing">Beijing</option>
                <option value="Baghdad">Baghdad</option>
                <option value="Dhaka">Dhaka</option>
                <option value="Jerusalem">Jerusalem</option>
                <option value="Jakarta">Jakarta</option>
                <option value="Kabul">Kabul</option>
                <option value="Manama">Manama</option>
                <option value="Nicosia">Nicosia</option>
                <option value="New Delhi">New Delhi</option>
                <option value="Phnom Penh">Phnom Penh</option>
                <option value="Thimphu">Thimphu</option>
                <option value="Tbilisi">Tbilisi</option>
                <option value="Tehran">Tehran</option>
                <option value="Tokyo">Tokyo</option>
                <option value="Tashkent">Tashkent</option>
                <option value="Yerevan">Yerevan</option>

            </select>
        </section>

        <section class="countries-list">

    </div>


    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/data.js"></script>
</body>

</html>
